<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    
    <!-- PWA / Apple Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ShuttleStreak" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <meta name="description" content="ShuttleStreak — local-first badminton habit tracker." />
    
    <title>ShuttleStreak</title>
    
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="manifest" href="manifest.json" />

    <!-- Your Assets -->
    <script type="module" crossorigin src="/assets/index-CgWkC_6c.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BMprYukJ.css">

    <style>
      #pwa-install-container {
        display: none;
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        color: white;
        padding: 12px 16px;
        border-radius: 12px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        width: 90%;
        max-width: 400px;
        align-items: center;
        justify-content: space-between;
        border: 1px solid #334155;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes slideUp {
        from { transform: translate(-50%, 150%); opacity: 0; }
        to { transform: translate(-50%, 0); opacity: 1; }
      }

      #install-btn {
        background: #10b981;
        color: #0f172a;
        border: none;
        padding: 8px 18px;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        margin-right: 8px;
        font-size: 0.85rem;
      }

      #close-install {
        background: transparent;
        color: #94a3b8;
        border: none;
        font-size: 24px;
        cursor: pointer;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- PWA Install Banner -->
    <div id="pwa-install-container">
      <p style="margin:0; font-size: 0.95rem; font-weight: 500;">Install ShuttleStreak to Home</p>
      <div style="display: flex; align-items: center;">
        <button id="install-btn">Install</button>
        <button id="close-install" aria-label="Close">&times;</button>
      </div>
    </div>

    <script>
      const installContainer = document.getElementById('pwa-install-container');
      const installBtn = document.getElementById('install-btn');
      const closeBtn = document.getElementById('close-install');
      let deferredPrompt;

      // 1. Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }

      // 2. Capture the install event
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Show the button
        installContainer.style.display = 'flex';
      });

      // 3. Trigger installation
      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          installContainer.style.display = 'none';
        }
        deferredPrompt = null;
      });

      // 4. Manual Close
      closeBtn.addEventListener('click', () => {
        installContainer.style.display = 'none';
      });

      // 5. Hide if already installed
      window.addEventListener('appinstalled', () => {
        installContainer.style.display = 'none';
        deferredPrompt = null;
      });
    </script>
  </body>
</html>
